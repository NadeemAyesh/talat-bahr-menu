<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="امسح الرمز للاطلاع على منيو مطعم طلة البحر" />
  <title>رمز QR | طلة البحر</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700&family=Cairo:wght@400;500;600;700&family=El+Messiri:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="images/logo.png" type="image/png" />
  <script>
    (function () {
      var s = localStorage.getItem("talat-bahr-theme");
      var t = s || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="qr-page">

  <button type="button" class="theme-toggle no-print" data-theme-toggle aria-pressed="true" aria-label="التبديل إلى الوضع النهاري" title="وضع نهاري">
    <svg class="theme-toggle__icon theme-toggle__icon--sun" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__icon--moon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  </button>

  <div class="qr-page__bg" aria-hidden="true"></div>
  <div class="qr-page__glow qr-page__glow--1" aria-hidden="true"></div>
  <div class="qr-page__glow qr-page__glow--2" aria-hidden="true"></div>

  <main class="qr-page__wrap">
    <article id="qr-poster" class="qr-poster">
      <div class="qr-poster__corner qr-poster__corner--tl" aria-hidden="true"></div>
      <div class="qr-poster__corner qr-poster__corner--tr" aria-hidden="true"></div>
      <div class="qr-poster__corner qr-poster__corner--bl" aria-hidden="true"></div>
      <div class="qr-poster__corner qr-poster__corner--br" aria-hidden="true"></div>

      <header class="qr-poster__header">
        <img
          src="images/logo.png"
          alt="مطعم طلة البحر"
          class="qr-poster__logo"
          width="320"
          height="172"
          crossorigin="anonymous"
        />
        <div class="qr-poster__divider">
          <span>◆</span>
        </div>
        <p class="qr-poster__tagline">امسح الرمز للاطلاع على المنيو</p>
        <p class="qr-poster__tagline-en">Scan to view our menu</p>
      </header>

      <div class="qr-poster__code-wrap">
        <div class="qr-poster__code-ring" aria-hidden="true"></div>
        <div class="qr-poster__code-frame">
          <canvas id="qr-canvas" width="280" height="280" role="img" aria-label="رمز QR للمنيو"></canvas>
          <div class="qr-poster__code-logo" aria-hidden="true">
            <img src="images/logo.png" alt="" width="56" height="30" crossorigin="anonymous" />
          </div>
        </div>
      </div>

      <footer class="qr-poster__footer">
        <p class="qr-poster__url" id="menu-url">talat-bahr-menu.netlify.app</p>
        <p class="qr-poster__note">مأكولات بحرية طازجة · من البحر لسفرتك</p>
      </footer>
    </article>

    <div class="qr-page__actions no-print">
      <button type="button" id="btn-print" class="qr-btn qr-btn--primary">طباعة</button>
      <button type="button" id="btn-download" class="qr-btn qr-btn--ghost">تحميل الصورة</button>
      <a href="index.html" class="qr-btn qr-btn--ghost">المنيو</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/qr.js"></script>
</body>
</html>
